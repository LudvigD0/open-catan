<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Open Catan</title>
    <link rel="stylesheet" href="./static/styles.css">
  </head>
  <body>
    <script type="module">
      import {
        WASI,
        OpenFile,
        File,
        ConsoleStdout
      } from "https://cdn.jsdelivr.net/npm/@bjorn3/browser_wasi_shim@0.4.2/dist/index.js";

      import ghc_wasm_jsffi from "/static/ghc_wasm_jsffi.js";

      const args = [];
      const env = ["GHCRTS=-H64m"];

      const fds = [
        new OpenFile(new File([])),
        ConsoleStdout.lineBuffered(msg => console.log(`[WASI stdout] ${msg}`)),
        ConsoleStdout.lineBuffered(msg => console.warn(`[WASI stderr] ${msg}`)),
      ];

      const wasi = new WASI(args, env, fds);
      const instance_exports = {};

      const { instance } = await WebAssembly.instantiateStreaming(
        fetch("/static/app.wasm"),
        {
          wasi_snapshot_preview1: wasi.wasiImport,
          ghc_wasm_jsffi: ghc_wasm_jsffi(instance_exports),
        }
      );

      Object.assign(instance_exports, instance.exports);

      wasi.initialize(instance);

      await instance.exports.hs_start(globalThis);
    </script>
  </body>
</html>
